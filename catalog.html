<!DOCTYPE html>
<html lang="en">
<head>

  <div class="container">

          src="/assets/logo-PQe6D84w.svg"
          alt="Cinemania"
          class="nav-logo"
          width="45"
          height="36"
          decoding="async"
        />
        <span class="logo-text">Cinemania</span>
      </a>

      <nav class="header__nav desktop-nav">
        <a href="./index.html" class="nav-link" data-page="home">HOME</a>
        <a href="./catalog.html" class="nav-link" data-page="catalog"
          >CATALOG</a
        >
        <a href="./library.html" class="nav-link" data-page="library"
          >MY LIBRARY</a
        >
      </nav>

      <nav class="mobile-nav">
        <div class="mobile-menu-logo">
          <a href="./index.html" class="logo-link">
            <img
              src="/assets/logo-PQe6D84w.svg"
              alt="Cinemania"
              class="nav-logo"
              width="45"
              height="36"
              decoding="async"
            />
            <span class="logo-text">Cinemania</span>
          </a>
        </div>
        <a href="./index.html" class="nav-link" data-page="home">HOME</a>
        <a href="./catalog.html" class="nav-link" data-page="catalog"
          >CATALOG</a
        >
        <a href="./library.html" class="nav-link" data-page="library"
          >MY LIBRARY</a
        >
      </nav>

      <button class="header__menu-btn" id="menuToggle">MENU</button>

              src="data:image/svg+xml,%3csvg%20width='14'%20height='14'%20viewBox='0%200%2014%2014'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%3e%3cpath%20d='M0.518229%207.27441C0.759845%2010.6211%203.6928%2013.3439%207.20294%2013.4933C9.67951%2013.5973%2011.8943%2012.4796%2013.2232%2010.7185C13.7736%209.99721%2013.4783%209.51634%2012.5588%209.6788C12.1091%209.75678%2011.646%209.78927%2011.1628%209.76977C7.88081%209.63981%205.19619%206.98199%205.18276%203.84329C5.17605%202.99851%205.35726%202.19921%205.68613%201.4714C6.04855%200.665606%205.6123%200.282204%204.77336%200.626616C2.11558%201.71184%200.296747%204.30467%200.518229%207.27441Z'%20stroke='white'%20stroke-linecap='round'%20stroke-linejoin='round'/%3e%3c/svg%3e"

            />

              decoding="async"
            />
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
    </div>
  </div>
</header>


    <main>
        <section id="hero" class="hero">
  <div class="hero__overlay">
    <div class="container">
      <div class="hero__content">
        <h1 class="hero__title"></h1>

        <div class="hero__rating"></div>

        <p class="hero__overview"></p>

        <div class="hero__actions"></div>
      </div>
    </div>
  </div>
</section>


        <section class="catalog-section">
            <div class="container">

                <div class="search-filter-wrapper">
                    <form class="search-filter-form" id="searchForm" autocomplete="off">

                        <div class="search-input-wrapper">
                            <input type="text" class="search-input" id="searchInput" placeholder="Search..." />
                            <button class="searcher__clear" type="button" id="clearBtn" hidden>✕</button>
                        </div>

                        <select class="searcher__year-native" id="yearSelect" hidden aria-hidden="true" tabindex="-1">
                            <option value="">Year</option>
                        </select>

                        <div id="yearSelectCustom" class="custom-select year-select">
                            <button type="button" class="custom-select__btn" aria-label="Select Year" aria-expanded="false">
                                <span class="custom-select__label">Year</span>
                                <svg class="custom-select__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#595959" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                            <ul class="custom-select__list hide year-menu">
                            </ul>
                        </div>

                        <button type="submit" class="search-btn" aria-label="Search">
                            <svg width="20" height="20" viewBox="0 0 32 32" fill="none" stroke="#111111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="14" cy="14" r="10"></circle>
                                <line x1="28" y1="28" x2="22" y2="22"></line>
                            </svg>
                        </button>
                    </form>
                </div>

                <div class="oops-message hidden" id="oopsMessage">
                    <p class="oops-title">OOPS...</p>
                    <p class="oops-text">We are very sorry!</p>
                    <p class="oops-text">We don’t have any results matching your search.</p>
                </div>

                <ul class="movie-grid" id="movieGrid"></ul>

                <div class="pagination" id="pagination">
                </div>
            </div>
        </section>
    </main>

    

    

    
</body>
</html>
