<section class="hero" id="hero">
  <div class="hero__bg" id="heroBg"></div>
  <div class="hero__overlay"></div>
  <div class="container hero__container">
    <div class="hero__content">
      <h1 class="hero__title" id="heroTitle"></h1>
      <div class="hero__meta" id="heroMeta"></div>
      <p class="hero__overview" id="heroOverview"></p>
      <div class="hero__actions">
        <button class="btn btn--primary" id="heroTrailerBtn" type="button">
          Watch Trailer
        </button>
        <button class="btn btn--secondary" id="heroDetailsBtn" type="button">
          More Details
        </button>
      </div>
    </div>
  </div>
</section>
