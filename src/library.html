<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/library.css" />
    <base target="_blank" />
    <title>Cinemania - Library</title>
  </head>
  <body>
    <load src="./partials/header.html" />
    <main class="libraryContainer">
      <section class="trendDay" id="hero">
        <div class="trendDayPlaceHolder" id="heroBg">
          <div class="container hero__container">
            <div class="hero__content">
              <h1 class="myCinemaPlaceHolder myCinemaHeader" id="heroTitle">
                Let's Make Your Own Cinema
              </h1>
              <p class="myCinemaTitle" id="heroOverview">
                Is a guide to designing a personalized movie theater experience with
                the right equipment, customized decor, and favorite films. This
                guide helps you bring the cinema experience into your own home with
                cozy seating, dim lighting, and movie theater snacks.
              </p>
              <div class="hero__actions">
                <button class="btn btn--primary" id="heroTrailerBtn" type="button" style="display:none;">Watch Trailer</button>
                <button class="btn btn--secondary" id="heroDetailsBtn" type="button" style="display:none;">More Details</button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="libraryRender"></section>
    </main>
    <load src="./partials/footer.html" />
    <load src="./partials/modal.html" />
    <load src="./partials/loader.html" />
    <script type="module" src="./js/library.js"></script>
  </body>
</html>
